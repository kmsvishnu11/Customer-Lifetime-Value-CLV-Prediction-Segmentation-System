# ============================================
# CLV Predictor - Docker Compose
# ============================================
# 
# Services:
#   - api: FastAPI backend
#   - dashboard: Streamlit frontend
#   - redis: Cache (optional)
#   - nginx: Reverse proxy (optional)
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f
#
# ============================================

version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clv-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/models
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8000/health'); assert r.status_code==200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - clv-network

  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: clv-dashboard
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - clv-network

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: clv-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - clv-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: clv-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard
    restart: unless-stopped
    networks:
      - clv-network
    profiles:
      - with-nginx

networks:
  clv-network:
    driver: bridge

volumes:
  redis-data:
    driver: local